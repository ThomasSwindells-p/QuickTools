<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Research Timeline Analyzer</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- JSZip for processing zip files directly -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        // --- Icon Components (Replacing lucide-react) ---
        const Search = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;
        const Upload = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>;
        const Calendar = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
        const Clock = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const LinkIcon = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>;
        const Database = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></svg>;
        const Filter = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>;
        const Download = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
        const RefreshCw = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
        const Trash2 = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
        const Info = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;

        function App() {
            const keywordsRef = useRef("llm, slm, large language model, small language model, hugging face, huggingface, production, deploy, ollama, vllm, lm studio");
            const [events, setEvents] = useState([]);
            const [loading, setLoading] = useState(false);
            const [stats, setStats] = useState({ totalFiles: 0, totalMatches: 0 });
            const [uploadedFiles, setUploadedFiles] = useState([]);
            const fileInputRef = useRef(null);

            const processZipFile = async (file, activeKeywords) => {
                const zip = new JSZip();
                let extractedEvents = [];
                try {
                    const loadedZip = await zip.loadAsync(file);
                    const zipFiles = Object.values(loadedZip.files);
                    
                    for (const zipEntry of zipFiles) {
                        if (zipEntry.dir) continue;
                        
                        if (zipEntry.name.endsWith('History.json')) {
                            const content = await zipEntry.async("string");
                            const events = parseHistoryJson(content, zipEntry.name, activeKeywords);
                            extractedEvents = [...extractedEvents, ...events];
                        } else if (zipEntry.name.endsWith('MyActivity.html')) {
                            const content = await zipEntry.async("string");
                            const events = parseActivityHtml(content, zipEntry.name, activeKeywords);
                            extractedEvents = [...extractedEvents, ...events];
                        }
                    }
                } catch (err) {
                    console.error("Error reading zip file:", err);
                    alert(`Error parsing ZIP file ${file.name}`);
                }
                return extractedEvents;
            };

            const processFile = async (file, activeKeywords) => {
                if (file.name.endsWith('.zip')) {
                    return processZipFile(file, activeKeywords);
                }

                return new Promise((resolve) => {
                    const reader = new FileReader();
                    
                    reader.onload = (e) => {
                        const content = e.target.result;
                        try {
                            if (file.name.endsWith('.json')) {
                                resolve(parseHistoryJson(content, file.name, activeKeywords));
                            } else if (file.name.endsWith('.html')) {
                                resolve(parseActivityHtml(content, file.name, activeKeywords));
                            } else {
                                resolve([]); // Ignore other formats
                            }
                        } catch (err) {
                            console.error("Error parsing file", file.name, err);
                            resolve([]); // Skip failing files instead of crashing
                        }
                    };
                    
                    // If the file cannot be read by the browser, resolve with empty array to continue batch processing safely
                    reader.onerror = (e) => {
                        console.error("FileReader error reading file:", file.name, e);
                        resolve([]); 
                    };
                    
                    reader.readAsText(file);
                });
            };

            const parseHistoryJson = (jsonString, source, activeKeywords) => {
                const data = JSON.parse(jsonString);
                const history = data["Browser History"] || [];
                const extracted = [];

                history.forEach(item => {
                    const textToSearch = (item.title || "").toLowerCase();
                    const match = activeKeywords.find(kw => textToSearch.includes(kw));
                    
                    if (match) {
                        // Handle different Google Takeout timestamp formats
                        let timestamp = Date.now();
                        if (item.time_usec) {
                            timestamp = Math.floor(item.time_usec / 1000);
                        } else if (item.timestamp_msec) {
                            timestamp = item.timestamp_msec;
                        }

                        extracted.push({
                            id: `${timestamp}-${Math.random()}`,
                            source: 'Chrome History',
                            fileName: source,
                            type: 'history',
                            title: item.title || "No Title",
                            url: item.url,
                            timestamp: timestamp,
                            date: new Date(timestamp),
                            matchedKeyword: match
                        });
                    }
                });
                return extracted;
            };

            const parseActivityHtml = (htmlString, source, activeKeywords) => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlString, 'text/html');
                const extracted = [];

                // Google Takeout uses .outer-cell for each activity item
                const cells = doc.querySelectorAll('.outer-cell');
                
                cells.forEach(cell => {
                    const textContent = cell.textContent || "";
                    const lowerText = textContent.toLowerCase();
                    
                    const match = activeKeywords.find(kw => lowerText.includes(kw));
                    if (match) {
                        // Try to extract the date. Usually in a .mdl-typography--text-right cell
                        const dateCell = cell.querySelector('.mdl-typography--text-right');
                        let dateObj = new Date();
                        let dateFound = false;

                        if (dateCell && dateCell.textContent) {
                            const parsedDate = new Date(dateCell.textContent.trim());
                            if (!isNaN(parsedDate.getTime())) {
                                dateObj = parsedDate;
                                dateFound = true;
                            }
                        }
                        
                        // Fallback: look for "Products: Gemini Apps" or similar to clean up output
                        let contentText = "";
                        const contentCells = cell.querySelectorAll('.content-cell:not(.mdl-typography--text-right):not(.mdl-typography--caption)');
                        contentCells.forEach(c => {
                            contentText += c.textContent.trim() + " ";
                        });

                        // If we still can't find a clean date, just assign it based on regex
                        if (!dateFound) {
                            const dateRegex = /([A-Z][a-z]{2} \d{1,2}, \d{4}, \d{1,2}:\d{2}:\d{2}\s(?:AM|PM))/;
                            const dateMatch = textContent.match(dateRegex);
                            if (dateMatch) {
                                const parsedMatch = new Date(dateMatch[0]);
                                if (!isNaN(parsedMatch.getTime())) {
                                    dateObj = parsedMatch;
                                }
                            }
                        }

                        extracted.push({
                            id: `${dateObj.getTime()}-${Math.random()}`,
                            source: 'Google Activity',
                            fileName: source,
                            type: 'activity',
                            title: contentText.substring(0, 300) + (contentText.length > 300 ? "..." : ""),
                            url: null,
                            timestamp: dateObj.getTime(),
                            date: dateObj,
                            matchedKeyword: match
                        });
                    }
                });

                return extracted;
            };

            const runProcessing = async (filesToProcess) => {
                setLoading(true);
                let allEvents = [];
                const currentKeywordList = keywordsRef.current.value.split(',').map(k => k.trim().toLowerCase()).filter(k => k);

                try {
                    for (const file of filesToProcess) {
                        const fileEvents = await processFile(file, currentKeywordList);
                        if (fileEvents && Array.isArray(fileEvents)) {
                            allEvents = [...allEvents, ...fileEvents];
                        }
                    }

                    // Sort by timestamp, oldest to newest (or newest to oldest)
                    allEvents.sort((a, b) => b.timestamp - a.timestamp); // Newest first

                    setEvents(allEvents);
                    setStats({
                        totalFiles: filesToProcess.length,
                        totalMatches: allEvents.length
                    });
                } catch (err) {
                    console.error("Error processing files", err);
                    alert("There was an error processing one or more files.");
                } finally {
                    setLoading(false);
                }
            };

            const handleFileUpload = async (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;

                const newFiles = [...uploadedFiles, ...files];
                setUploadedFiles(newFiles);
                await runProcessing(newFiles);
                
                if (fileInputRef.current) fileInputRef.current.value = "";
            };

            const handleReprocess = async () => {
                if (uploadedFiles.length === 0) return;
                await runProcessing(uploadedFiles);
            };

            const exportToCSV = () => {
                if (events.length === 0) return;
                const headers = ["Date", "Source", "Type", "Matched Keyword", "Title", "URL"];
                const csvRows = [headers.join(",")];
                
                events.forEach(ev => {
                    const dateStr = ev.date.toISOString();
                    const title = `"${(ev.title || "").replace(/"/g, '""')}"`;
                    const url = `"${(ev.url || "").replace(/"/g, '""')}"`;
                    csvRows.push([dateStr, ev.source, ev.type, ev.matchedKeyword, title, url].join(","));
                });
                
                const blob = new Blob([csvRows.join("\n")], { type: "text/csv" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "ai_research_timeline.csv";
                a.click();
                URL.revokeObjectURL(url);
            };

            const handleReset = () => {
                setEvents([]);
                setUploadedFiles([]);
                setStats({ totalFiles: 0, totalMatches: 0 });
                if (fileInputRef.current) fileInputRef.current.value = "";
            };

            return (
                <div className="min-h-screen p-6">
                    <div className="max-w-5xl mx-auto space-y-6">
                        
                        {/* Header */}
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex items-start justify-between">
                            <div>
                                <h1 className="text-2xl font-bold text-slate-900 flex items-center gap-2 flex-wrap">
                                    <Database className="text-indigo-600" /> AI Research Timeline Analyzer
                                    <span className="text-xs align-middle bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full border border-emerald-200">100% Local Processing</span>
                                </h1>
                                <p className="text-slate-500 mt-2">
                                    Parse and analyze your Google Takeout files (MyActivity.html, History.json) to trace your AI investigation journey. <strong>Your data never leaves your device.</strong>
                                </p>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            
                            {/* Left Column: Settings & Upload */}
                            <div className="md:col-span-1 space-y-6">
                                
                                {/* Keywords Panel */}
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
                                    <h2 className="text-sm font-semibold text-slate-800 uppercase tracking-wider mb-3 flex items-center gap-2">
                                        <Filter className="w-4 h-4" /> Keywords Filter
                                    </h2>
                                    <textarea
                                        className="w-full h-32 p-3 text-sm bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
                                        defaultValue={keywordsRef.current}
                                        ref={keywordsRef}
                                        placeholder="Comma separated keywords..."
                                    />
                                    <div className="flex items-center justify-between mt-3">
                                        <p className="text-xs text-slate-500">
                                            Update and reprocess existing files.
                                        </p>
                                        <button 
                                            onClick={handleReprocess}
                                            disabled={loading || uploadedFiles.length === 0}
                                            className="flex items-center gap-1 text-sm bg-indigo-100 text-indigo-700 px-3 py-1.5 rounded hover:bg-indigo-200 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                                        >
                                            <RefreshCw className="w-4 h-4" /> Reprocess
                                        </button>
                                    </div>
                                </div>

                                {/* Upload Panel */}
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 text-center">
                                    <input
                                        type="file"
                                        multiple
                                        accept=".zip,.json,.html"
                                        className="hidden"
                                        ref={fileInputRef}
                                        onChange={handleFileUpload}
                                    />
                                    <button
                                        onClick={() => fileInputRef.current.click()}
                                        disabled={loading}
                                        className={`w-full py-4 rounded-xl border-2 border-dashed flex flex-col items-center justify-center transition-all ${
                                            loading 
                                                ? 'border-slate-300 bg-slate-50 text-slate-400 cursor-not-allowed' 
                                                : 'border-indigo-300 bg-indigo-50 text-indigo-700 hover:bg-indigo-100 hover:border-indigo-400'
                                        }`}
                                    >
                                        {loading ? (
                                            <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600 mb-2"></div>
                                        ) : (
                                            <Upload className="w-8 h-8 mb-2" />
                                        )}
                                        <span className="font-medium">
                                            {loading ? 'Processing Files...' : 'Upload Google Takeout (.zip)'}
                                        </span>
                                        <span className="text-xs mt-1 opacity-75">
                                            Select your downloaded .zip file
                                        </span>
                                    </button>

                                    {stats.totalFiles > 0 && (
                                        <div className="mt-4 pt-4 border-t border-slate-100 flex justify-between items-center text-sm text-slate-600">
                                            <span>{stats.totalFiles} files loaded</span>
                                            <button onClick={handleReset} className="flex items-center gap-1 text-red-600 hover:text-red-700 transition-colors">
                                                <Trash2 className="w-4 h-4" /> Reset All
                                            </button>
                                        </div>
                                    )}
                                </div>
                                
                                {/* How to Get Files Panel */}
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
                                    <h2 className="text-sm font-semibold text-slate-800 uppercase tracking-wider mb-3 flex items-center gap-2">
                                        <Info className="w-4 h-4 text-blue-500" /> How to get your files
                                    </h2>
                                    <ol className="list-decimal list-inside text-sm text-slate-600 space-y-2 mb-4">
                                        <li>Go to <a href="https://takeout.google.com" target="_blank" rel="noopener noreferrer" className="text-indigo-600 hover:underline font-medium">Google Takeout</a>.</li>
                                        <li>Click <strong>"Deselect all"</strong>.</li>
                                        <li>Scroll down and check <strong>Chrome</strong>.</li>
                                        <li>Check <strong>My Activity</strong>. Click on <strong>"All activity data included"</strong>, click "Deselect all" within that popup, and then select only <strong>Gemini Apps</strong>.</li>
                                        <li>Scroll to the bottom, click <strong>"Next step"</strong>, then <strong>"Create export"</strong>.</li>
                                        <li>Upload the downloaded <code className="bg-slate-100 text-slate-800 px-1.5 py-0.5 rounded text-xs border border-slate-200">.zip</code> file directly above. No need to extract it!</li>
                                    </ol>
                                    <div className="bg-amber-50 border border-amber-200 text-amber-800 text-xs p-3 rounded-lg leading-relaxed">
                                        <strong>⚠️ Note:</strong> Depending on the size of your data, Google may take anywhere from a few minutes to <strong>up to 24 hours</strong> to prepare your export and email you the download link.
                                    </div>
                                </div>

                            </div>

                            {/* Right Column: Timeline */}
                            <div className="md:col-span-2">
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 min-h-[500px]">
                                    <div className="flex items-center justify-between mb-6 pb-4 border-b border-slate-100">
                                        <div className="flex items-center gap-3">
                                            <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                                                <Clock className="w-5 h-5 text-indigo-600" /> Timeline Results
                                            </h2>
                                            <div className="text-sm font-medium bg-indigo-50 text-indigo-700 py-1 px-3 rounded-full">
                                                {stats.totalMatches} events found
                                            </div>
                                        </div>
                                        
                                        <button
                                            onClick={exportToCSV}
                                            disabled={events.length === 0}
                                            className="flex items-center gap-2 text-sm font-medium bg-slate-900 text-white px-4 py-2 rounded-lg hover:bg-slate-800 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                                        >
                                            <Download className="w-4 h-4" /> Export CSV
                                        </button>
                                    </div>

                                    {events.length === 0 ? (
                                        <div className="h-64 flex flex-col items-center justify-center text-slate-400 text-center">
                                            <Search className="w-12 h-12 mb-3 opacity-20" />
                                            <p>Upload files to see your research timeline.<br/>Data is processed entirely in your browser.</p>
                                        </div>
                                    ) : (
                                        <div className="relative border-l-2 border-slate-100 ml-3 space-y-8 pb-4">
                                            {events.map((ev, idx) => (
                                                <div key={ev.id} className="relative pl-6 group">
                                                    {/* Timeline Node */}
                                                    <div className={`absolute -left-[9px] top-1.5 w-4 h-4 rounded-full border-2 border-white ${ev.type === 'history' ? 'bg-blue-500' : 'bg-purple-500'}`}></div>
                                                    
                                                    {/* Card */}
                                                    <div className="bg-white border border-slate-200 rounded-xl p-4 shadow-sm group-hover:shadow-md transition-shadow">
                                                        <div className="flex flex-wrap items-center justify-between gap-2 mb-2">
                                                            <div className="flex items-center gap-2 text-xs font-medium uppercase tracking-wider">
                                                                <span className={ev.type === 'history' ? 'text-blue-600' : 'text-purple-600'}>
                                                                    {ev.source}
                                                                </span>
                                                                <span className="text-slate-300">•</span>
                                                                <span className="text-slate-500 bg-slate-100 px-2 py-0.5 rounded">
                                                                    Keyword: {ev.matchedKeyword}
                                                                </span>
                                                            </div>
                                                            <div className="flex items-center gap-1 text-xs text-slate-500">
                                                                <Calendar className="w-3 h-3" />
                                                                {ev.date.toLocaleString(undefined, {
                                                                    year: 'numeric', month: 'short', day: 'numeric', 
                                                                    hour: '2-digit', minute:'2-digit'
                                                                })}
                                                            </div>
                                                        </div>

                                                        <p className="text-sm text-slate-800 break-words leading-relaxed">
                                                            {ev.title || "No Title Available"}
                                                        </p>

                                                        {ev.url && (
                                                            <a 
                                                                href={ev.url} 
                                                                target="_blank" 
                                                                rel="noopener noreferrer" 
                                                                className="mt-3 inline-flex items-center gap-1 text-xs text-indigo-600 hover:text-indigo-800 hover:underline break-all"
                                                            >
                                                                <LinkIcon className="w-3 h-3 flex-shrink-0" />
                                                                {ev.url.length > 80 ? ev.url.substring(0, 80) + '...' : ev.url}
                                                            </a>
                                                        )}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
